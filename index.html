<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Previsão de Salário com IA</title>
    
    <!-- TensorFlow -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    
    <!-- Fonte bonita -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #768df3, #f174d6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .card p {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #c065a2;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.5);
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #555;
        }

        #resultado {
            margin-top: 15px;
            font-size: 20px;
            color: #667eea;
        }

        footer {
            margin-top: 25px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>💼 Previsão de Salário</h2>
        <p>
            Esta IA foi treinada usando TensorFlow.js para prever o salário
            com base nos anos de experiência profissional.
        </p>

        <input 
            type="number" 
            id="experiencia" 
            placeholder="Anos de experiência (ex: 3)"
        >

        <button onclick="treinarEPrever()">Treinar e Prever</button>

        <h3 id="status">Status: Aguardando...</h3>
        <h2 id="resultado"></h2>

        <footer>
            Machine Learning • TensorFlow.js
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
